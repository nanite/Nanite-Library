name: Snapshot

on:
  push:
    branches:
      - "main"
      - "**/main"
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "CHANGELOG.md"

jobs:
  build:
    if: |
      !contains(github.event.head_commit.message, '[ciskip]')
    uses: nanite/workflows/.github/workflows/base-java.yml@v1.3
    with:
      java-version: 25
      use-snapshots: true
      gradle-tasks: build publish
    secrets:
      nanite-token: ${{ secrets.NANITE_DEPLOY }}
