plugins {
    id 'java-library'
    id 'fabric-loom' version '1.11-SNAPSHOT' apply(false)
    id 'net.neoforged.moddev' version '2.0.112' apply(false)
    id "me.modmuss50.mod-publish-plugin" version "1.0.0"
}


ext.isSnapshot = true//providers.environmentVariable("SNAPSHOT").map { it == "true" }.getOrElse(false)

allprojects {
    apply plugin: 'idea'
    apply plugin: 'java-library'
    apply plugin: 'maven-publish'

    version = "${mod_version}${isSnapshot ? '-SNAPSHOT' : ''}"
    java.toolchain.languageVersion = JavaLanguageVersion.of(21)

    repositories {
        mavenLocal()
        mavenCentral()
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
    }

    dependencies {
        testImplementation platform('org.junit:junit-bom:5.10.3')
    }

    idea {
        module {
            downloadSources = true
            downloadJavadoc = true
        }
    }
}

subprojects {
    if (project.name == "standard") {
        return
    }

    base {
        archivesName = "${mod_name.replaceAll(" ", "-").toLowerCase()}-${project.name}"
    }

    if (project.name != "common" && project.name != "standard") {
        dependencies {
            api project(":common")
            api project(":standard")
        }

        jar {
            from project(":standard").sourceSets.main.output
            from project(":common").sourceSets.main.output
        }
    }

    java.withSourcesJar()

//    jar {
//        from(rootProject.file("LICENSE")) {
//            rename { "${it}_${mod_name}" }
//        }
//        manifest {
//            attributes([
//                    'Specification-Title'     : mod_name,
//                    'Specification-Vendor'    : mod_author,
//                    'Specification-Version'   : project.jar.archiveVersion,
//                    'Implementation-Title'    : project.name,
//                    'Implementation-Version'  : project.jar.archiveVersion,
//                    'Implementation-Vendor'   : mod_author,
//                    'Implementation-Timestamp': new Date().format("yyyy-MM-dd'T'HH:mm:ssZ"),
//                    'Timestamp'               : System.currentTimeMillis(),
//                    'Built-On-Java'           : "${System.getProperty('java.vm.version')} (${System.getProperty('java.vm.vendor')})",
//                    'Built-On-Minecraft'      : minecraft_version
//            ])
//        }
//    }

    sourcesJar {
        from(rootProject.file("LICENSE")) {
            rename { "${it}_${mod_name}" }
        }
    }

    processResources {
        filesMatching(['pack.mcmeta', 'fabric.mod.json', 'META-INF/neoforge.mods.toml', 'neoforge.mods.toml', '*.mixins.json']) {
            expand project.properties
        }
    }

    publishing {
        repositories {
//            if (providers.environmentVariable("MAVEN_TOKEN").orNull) {
//                maven {
//                    url "${maven_url}${isSnapshot ? 'snapshots' : 'releases'}"
//                    credentials {
//                        username = "admin"
//                        password = providers.environmentVariable("MAVEN_TOKEN").get()
//                    }
//                }
//            }
        }
    }
}

