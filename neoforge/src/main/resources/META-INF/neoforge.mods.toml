modLoader="javafml" #mandatory
loaderVersion="[4,)" #mandatory
license="MPL-2"

[[mods]]
modId="${mod_id}"
version="${version}"
displayName="${mod_name}" #mandatory
authors="${mod_author}" #optional
description='''
Library mod for the Nanite family of mods. Provides common code and utilities for the various Nanite mods, as well as a common APIs for cross-loader mods
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    required=true
    versionRange="${neoforge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    required=true
    versionRange="${minecraft_version_range_mvn}"
    ordering="NONE"
    side="BOTH"

[[mixins]]
config="${mod_id}.mixins.json"

[[mixins]]
config="${mod_id}.neo.mixins.json"
